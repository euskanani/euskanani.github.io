<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Marc Kanani</title>
  <link href="styles/google_fonts.css" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink: #1a1814;
      --ink-soft: #4a4640;
      --ink-muted: #9a9590;
      --paper: #faf9f6;
      --paper-warm: #f2f0eb;
      --accent: #b8a98a;
      --accent-dark: #7c6d55;
      --rule: rgba(26,24,20,0.1);
    }

    html, body {
      height: 100%;
      font-family: 'Jost', sans-serif;
      background: var(--paper);
      color: var(--ink);
      font-weight: 300;
      overflow: hidden;
    }

    .entry {
      height: 100vh;
      display: grid;
      grid-template-columns: 1fr 1fr;
    }

    /* Left — Art gallery */
    .side {
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 3.5rem;
      cursor: pointer;
      transition: flex 0.6s cubic-bezier(0.77,0,0.18,1);
      text-decoration: none;
    }

    .side-art  { background: var(--paper-warm); flex: 1; }
    .side-tech { background: #0f0e0c; flex: 1; }

    .side::after {
      content: '';
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity 0.4s;
    }

    .side-art::after  { background: rgba(26,24,20,0.06); }
    .side-tech::after { background: rgba(200,169,106,0.06); }

    .side:hover::after { opacity: 1; }
    .entry:has(.side-art:hover)  .side-tech { flex: 0.72; }
    .entry:has(.side-tech:hover) .side-art  { flex: 0.72; }

    /* Vertical label */
    .side-label {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      pointer-events: none;
      transition: opacity 0.3s;
    }

    .side-art  .side-label { opacity: 1; }
    .side-tech .side-label { opacity: 1; }

    .label-eyebrow {
      font-size: 0.6rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      margin-bottom: 1rem;
      display: block;
    }

    .side-art  .label-eyebrow { color: var(--ink-muted); }
    .side-tech .label-eyebrow { color: rgba(200,169,106,0.6); }

    .label-name {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      line-height: 1.1;
      display: block;
    }

    .side-art  .label-name { font-size: clamp(2.2rem, 4vw, 3.5rem); color: var(--ink); }
    .side-tech .label-name { font-size: clamp(2.2rem, 4vw, 3.5rem); color: #e8e4df; }

    .label-name em { font-style: italic; }
    .side-art  .label-name em { color: var(--accent-dark); }
    .side-tech .label-name em { color: #c8a96a; }

    .label-sub {
      display: block;
      font-size: 0.72rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-top: 1.5rem;
    }

    .side-art  .label-sub { color: var(--ink-soft); }
    .side-tech .label-sub { color: rgba(200,169,106,0.7); }

    /* Bottom corner cue */
    .side-cta {
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 0.6rem;
      opacity: 0;
      transform: translateY(6px);
      transition: opacity 0.3s, transform 0.3s;
    }

    .side-art  .side-cta { color: var(--ink-muted); }
    .side-tech .side-cta { color: rgba(200,169,106,0.6); }

    .side:hover .side-cta {
      opacity: 1;
      transform: none;
    }

    /* Divider */
    .divider {
      position: absolute;
      left: 50%;
      top: 0;
      bottom: 0;
      width: 1px;
      background: var(--rule);
      pointer-events: none;
      z-index: 2;
    }

    /* SVG art flourish */
    .art-bg {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      opacity: 0.15;
      pointer-events: none;
    }

    /* Tech grid bg */
    .tech-bg {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      opacity: 0.12;
      pointer-events: none;
    }

    /* Signature bottom */
    .entry-footer {
      position: fixed;
      bottom: 1.8rem;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--ink-muted);
      z-index: 10;
      white-space: nowrap;
    }

    @media (max-width: 600px) {
      .entry { grid-template-columns: 1fr; grid-template-rows: 1fr 1fr; }
      .entry:has(.side-art:hover)  .side-tech { flex: 1; }
      .entry:has(.side-tech:hover) .side-art  { flex: 1; }
    }
  </style>
</head>
<body>

<div class="entry">

  <!-- ART SIDE -->
  <a class="side side-art" href="gallery/index.html">
    <!-- Soft painterly background shapes -->
    <svg class="art-bg" viewBox="0 0 500 700" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
      <ellipse cx="250" cy="300" rx="200" ry="250" fill="#c4b49a"/>
      <ellipse cx="150" cy="180" rx="130" ry="110" fill="#d4b88a"/>
      <ellipse cx="340" cy="420" rx="90" ry="120" fill="#b8a080"/>
    </svg>

    <div class="side-label">
      <span class="label-eyebrow">Artist &amp; Painter</span>
      <span class="label-name">Marc<br><em>Kanani</em></span>
      <span class="label-sub">Gallery</span>
    </div>

    <span class="side-cta">Enter gallery →</span>
  </a>

  <!-- TECH SIDE -->
  <a class="side side-tech" href="portfolio/index.html">
    <!-- Data grid background -->
    <svg class="tech-bg" viewBox="0 0 500 700" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
      <g stroke="#c8a96a" stroke-width="0.5" fill="none">
        <line x1="0" y1="100" x2="500" y2="100"/>
        <line x1="0" y1="200" x2="500" y2="200"/>
        <line x1="0" y1="300" x2="500" y2="300"/>
        <line x1="0" y1="400" x2="500" y2="400"/>
        <line x1="0" y1="500" x2="500" y2="500"/>
        <line x1="0" y1="600" x2="500" y2="600"/>
        <line x1="100" y1="0" x2="100" y2="700"/>
        <line x1="200" y1="0" x2="200" y2="700"/>
        <line x1="300" y1="0" x2="300" y2="700"/>
        <line x1="400" y1="0" x2="400" y2="700"/>
      </g>
      <circle cx="200" cy="250" r="4" fill="#c8a96a"/>
      <circle cx="300" cy="350" r="4" fill="#c8a96a"/>
      <circle cx="100" cy="450" r="4" fill="#c8a96a"/>
      <line x1="200" y1="250" x2="300" y2="350" stroke="#c8a96a" stroke-width="1"/>
      <line x1="300" y1="350" x2="100" y2="450" stroke="#c8a96a" stroke-width="1"/>
    </svg>

    <div class="side-label">
      <span class="label-eyebrow">Data Engineer</span>
      <span class="label-name">Marc<br><em>Kanani</em></span>
      <span class="label-sub">Portfolio</span>
    </div>

    <span class="side-cta">Enter portfolio →</span>
  </a>

</div>

<div class="divider"></div>

<p class="entry-footer">Choose a world — Paris, France</p>

</body>
</html>

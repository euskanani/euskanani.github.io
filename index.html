<!DOCTYPE html>

<head>

  <title>Marc Kanani</title>

    <link rel="icon" sizes="32x32" href="images/icons/logo.png">

  <link href="styles/google_fonts.css" rel="stylesheet" />

<body>

<div class="entry">

  <!-- ╔══════════════════════════════════════╗ -->
  <!-- ║  LEFT — PORTFOLIO (light theme)      ║ -->
  <!-- ╚══════════════════════════════════════╝ -->
  <a class="side side-portfolio" href="portfolio/index.html">
    <!-- Soft grid bg -->
    <svg class="tech-bg" viewBox="0 0 500 700" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
      <g stroke="#7c6d55" stroke-width="0.5" fill="none">
        <line x1="0" y1="100" x2="500" y2="100"/> <line x1="0" y1="200" x2="500" y2="200"/>
        <line x1="0" y1="300" x2="500" y2="300"/> <line x1="0" y1="400" x2="500" y2="400"/>

        <line x1="100" y1="0" x2="100" y2="700"/> <line x1="200" y1="0" x2="200" y2="700"/>
        <line x1="300" y1="0" x2="300" y2="700"/> <line x1="400" y1="0" x2="400" y2="700"/>
      </g>
      <circle cx="200" cy="250" r="4" fill="#7c6d55"/>
      <circle cx="300" cy="350" r="4" fill="#7c6d55"/>
      <circle cx="100" cy="450" r="4" fill="#7c6d55"/>
      <line x1="200" y1="250" x2="300" y2="350" stroke="#7c6d55" stroke-width="1"/>
      <line x1="300" y1="350" x2="100" y2="450" stroke="#7c6d55" stroke-width="1"/>
    </svg>

    <div class="side-label">
      <span class="label-eyebrow">Data Engineer</span>
      <span class="label-name">Marc <em>Kanani</em></span>
      <span class="label-sub">Portfolio</span>
    </div>

    <span class="side-cta">Enter portfolio →</span>
  </a>

  <!-- ╔══════════════════════════════════════╗ -->
  <!-- ║  RIGHT — GALLERY (dark theme)        ║ -->
  <!-- ╚══════════════════════════════════════╝ -->
  <a class="side side-gallery" href="gallery/index.html">
    <!-- Painterly bg shapes -->
    <svg class="art-bg" viewBox="0 0 500 700" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
      <ellipse cx="250" cy="300" rx="200" ry="250" fill="#c8a96a"/>
      <ellipse cx="150" cy="180" rx="130" ry="110" fill="#a88a4a"/>
      <ellipse cx="340" cy="420" rx="90"  ry="120" fill="#8a6a30"/>
    </svg>

    <div class="side-label">
      <span class="label-eyebrow">Artist &amp; Painter</span>
      <span class="label-name">Marc <em>Kanani</em></span>
      <span class="label-sub">Gallery</span>
    </div>

    <span class="side-cta">Enter gallery →</span>
  </a>

<div class="divider"></div>

<p class="entry-footer">Choose a world — Paris, France</p>
